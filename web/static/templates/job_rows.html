{{range .}}
<tr>
    <td><span class="job-id" title="{{.ID}}">{{.ID}}</span></td>
    <td><span class="job-name">{{.Name}}</span></td>
    <td><span class="job-date">{{formatDate .Date}}</span></td>
    <td>
        <span class="status-indicator status-{{.Status}}</span>
    </td>
    <td>
        <div class="actions-cell">
            {{ if eq .Status "ok" }}
            <a href="/download?id={{.ID}}" download class="btn-sm download-button">Download CSV</a>
            {{ end }}
            <button type="button"
                hx-delete="/delete?id={{.ID}}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Delete this job and its results?"
                class="btn-sm delete-button">Delete</button>
        </div>
    </td>
</tr>
{{else}}
<tr class="empty-row">
    <td colspan="5">
        <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1"/>
                <path d="M9 12h6M9 16h6"/>
            </svg>
            <strong>No jobs yet</strong>
            <p>Fill in the form and start your first scrape.</p>
        </div>
    </td>
</tr>
{{end}}
